<!DOCTYPE html>
<html>
<head>
    <title>Extract Secret</title>
    <style>
        body {
            font-family: monospace;
            background: #0a0e1a;
            color: #00ff88;
            padding: 40px;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: #1e2436;
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #00ff88;
        }
        input {
            width: 100%;
            padding: 10px;
            background: #0a0e1a;
            border: 1px solid #00ff88;
            color: #00ff88;
            margin: 10px 0;
            box-sizing: border-box;
        }
        button {
            background: #00ff88;
            color: black;
            padding: 12px 24px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 20px;
            width: 100%;
        }
        button:hover {
            background: #00cc66;
        }
        .result {
            background: #0a0e1a;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #00ff88;
            border-radius: 8px;
            word-wrap: break-word;
        }
        .result h3 {
            margin: 0 0 10px 0;
            color: #00ff88;
        }
        .result p {
            margin: 0;
            font-size: 16px;
        }
        .error {
            background: #ff4444;
            color: white;
            padding: 10px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #00ff88;
            text-decoration: none;
            text-align: center;
            width: 100%;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .info {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔓 EXTRACT A SECRET</h1>
        <p style="text-align: center;">Reveal hidden messages from images</p>
        
        <form method="POST" enctype="multipart/form-data">
            <label>📷 Upload hidden image:</label>
            <input type="file" name="image" accept="image/png" required>
            
            <label>🔑 Enter the password:</label>
            <input type="text" name="password" placeholder="The password used to hide it" required>
            
            <button type="submit">🔍 REVEAL SECRET 🔍</button>
        </form>
        
        {% if result %}
        <div class="result">
            <h3>💎 YOUR SECRET MESSAGE:</h3>
            <p>{{ result }}</p>
        </div>
        {% endif %}
        
        {% if error %}
        <div class="error">❌ {{ error }}</div>
        {% endif %}
        
        <a href="/" class="back-link">← Back to Home</a>
        
        <div class="info">
            💡 Upload a PNG image that was created with the Hide tool.<br>
            Enter the correct password to reveal the hidden message.
        </div>
    </div>
</body>
</html>
