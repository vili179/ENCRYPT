<style>
:root{--bg-primary:#060810;--bg-secondary:#0d1120;--bg-card:#111827;--border:#1e3a5f;--accent:#0ea5e9;--accent2:#06b6d4;--accent3:#22d3ee;--text-primary:#e2f4ff;--text-secondary:#7fb3cc;--text-dim:#3a6278;--danger:#ef4444;--success:#10b981;--warning:#f59e0b;--grid-color:rgba(14,165,233,0.04);--scan-color:rgba(14,165,233,0.06);}
[data-theme="light"]{--bg-primary:#f0f4f8;--bg-secondary:#e2eaf4;--bg-card:#ffffff;--border:#b0cce0;--accent:#0369a1;--accent2:#0284c7;--accent3:#0ea5e9;--text-primary:#0c1824;--text-secondary:#2d6080;--text-dim:#8ab0c4;--danger:#dc2626;--success:#059669;--warning:#d97706;--grid-color:rgba(3,105,161,0.04);--scan-color:rgba(3,105,161,0.05);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Rajdhani',sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;overflow-x:hidden;transition:background .4s,color .4s;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--grid-color) 1px,transparent 1px),linear-gradient(90deg,var(--grid-color) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,var(--scan-color) 0px,var(--scan-color) 1px,transparent 1px,transparent 3px);pointer-events:none;z-index:0;}
.wrapper{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:0 16px 80px;}
header{display:flex;align-items:center;justify-content:space-between;padding:20px 0 0;margin-bottom:28px;}
.logo-title{font-family:'Share Tech Mono',monospace;font-size:22px;color:var(--accent);letter-spacing:3px;line-height:1;}
.logo-sub{font-size:10px;letter-spacing:4px;color:var(--text-dim);text-transform:uppercase;margin-top:2px;}
.header-right{display:flex;align-items:center;gap:12px;}
.status-dot{display:flex;align-items:center;gap:6px;font-size:10px;font-family:'Share Tech Mono',monospace;color:var(--success);letter-spacing:1px;}
.dot{width:6px;height:6px;background:var(--success);border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.theme-toggle{background:var(--bg-card);border:1px solid var(--border);border-radius:20px;width:52px;height:28px;cursor:pointer;position:relative;transition:border-color .3s;flex-shrink:0;}
.theme-toggle:hover{border-color:var(--accent);}
.theme-toggle::before{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:var(--accent);transition:transform .3s cubic-bezier(.68,-.55,.27,1.55);}
[data-theme="light"] .theme-toggle::before{transform:translateX(24px);}
.theme-icon{position:absolute;top:50%;transform:translateY(-50%);font-size:10px;pointer-events:none;}
.icon-moon{left:6px;}.icon-sun{right:6px;}
.sys-bar{background:var(--bg-secondary);border:1px solid var(--border);border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:1px;}
.sys-bar em{color:var(--accent3);font-style:normal;}
.nav-tabs{display:flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:24px;background:var(--bg-secondary);}
.nav-tab{flex:1;padding:14px 10px;text-align:center;cursor:pointer;font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);transition:all .3s;border:none;background:transparent;position:relative;font-family:'Rajdhani',sans-serif;text-decoration:none;display:flex;align-items:center;justify-content:center;}
.nav-tab.active{background:var(--bg-card);color:var(--accent);}
.nav-tab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent2),var(--accent3));}
.nav-tab:not(.active):hover{color:var(--text-secondary);}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:16px;}
.card-header{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.card-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.card-title{font-size:16px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-primary);}
.card-desc{font-size:12px;color:var(--text-dim);letter-spacing:1px;}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;background:rgba(14,165,233,0.15);color:var(--accent);border:1px solid rgba(14,165,233,0.3);margin-left:8px;}
.field{margin-bottom:18px;}
.field-label{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-secondary);margin-bottom:8px;}
input[type="file"]{display:none;}
.file-drop{border:2px dashed var(--border);border-radius:10px;padding:28px 20px;text-align:center;cursor:pointer;transition:all .3s;background:var(--bg-secondary);}
.file-drop:hover,.file-drop.dragover{border-color:var(--accent);background:rgba(14,165,233,0.05);}
[data-theme="light"] .file-drop:hover,[data-theme="light"] .file-drop.dragover{background:rgba(3,105,161,0.05);}
.file-drop.has-file{border-color:var(--success);border-style:solid;background:rgba(16,185,129,0.05);}
.file-drop.has-file .drop-text{color:var(--success);}
.drop-icon{font-size:28px;margin-bottom:8px;display:block;}
.drop-text{font-size:13px;color:var(--text-secondary);letter-spacing:1px;}
.drop-sub{font-size:10px;color:var(--text-dim);margin-top:4px;font-family:'Share Tech Mono',monospace;}
.field-input{width:100%;padding:12px 14px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-family:'Share Tech Mono',monospace;font-size:13px;letter-spacing:1px;transition:border-color .3s,box-shadow .3s;outline:none;-webkit-appearance:none;}
.field-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(14,165,233,0.1);}
[data-theme="light"] .field-input:focus{box-shadow:0 0 0 3px rgba(3,105,161,0.1);}
textarea.field-input{resize:vertical;min-height:90px;}
.password-wrap{position:relative;}
.password-wrap .field-input{padding-right:44px;}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:16px;padding:4px;line-height:1;}
.strength-bar{display:flex;gap:4px;margin-top:8px;}
.strength-seg{height:3px;flex:1;border-radius:2px;background:var(--border);transition:background .3s;}
.char-count-row{display:flex;justify-content:flex-end;margin-top:4px;}
